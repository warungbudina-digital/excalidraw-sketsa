# .nudge.yaml — Konfigurasi Nudge (user-level / project root)
# Dikonversi dari catatan standar VPS + standar build Docker.
# Format mengikuti skema Nudge: https://github.com/attunehq/nudge
# Validasi dengan: `nudge validate`
#
# ─────────────────────────────────────────────────────────────────────────────
# REFERENSI ENVIRONMENT (komentar — bukan rule, hanya catatan)
#   Platform : Google Cloud Shell (EPHEMERAL — data hilang saat sesi berakhir)
#   OS       : Ubuntu 24.04.4 LTS, kernel 6.6.137+ x86_64
#   CPU/RAM  : 2 vCPU Intel Xeon @2.20GHz / 7.8Gi (swap 0)
#   Disk     : 100G, terpakai 76% (sisa ~23G) — WASPADA kapasitas
#   Region   : asia-southeast1 (timezone default UTC)
#   IP       : internal 10.88.0.3 / eksternal 34.142.249.233
#   Runtime  : Node 24.16, Python 3.12, Go 1.26, PHP 8.3, Ruby 3.2, Java 17
#   DB       : PostgreSQL 16, MySQL 8, Redis 7, SQLite 3.45
#   DevOps   : Docker 29.5, Compose v5.1, kubectl, Helm, Terraform, gcloud 571
#   Port sistem (JANGAN dipakai): 22, 900, 922, 970, 971, 980, 981, 8998
# ─────────────────────────────────────────────────────────────────────────────

version: 1

rules:
  # ───────────────────────────────────────────────
  # STANDAR BUILD — DOCKER MULTI-STAGE
  # ───────────────────────────────────────────────

  # Pin versi base image — dilarang tag :latest yang tidak deterministik.
  - name: dockerfile-pin-base-image
    description: Pin base image ke versi spesifik, jangan pakai :latest
    message: "Jangan gunakan tag `:latest` pada base image — pin ke versi spesifik (mis. `node:24-alpine`) agar build deterministik, lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/Dockerfile*"
        content:
          - kind: Regex
            pattern: "(?im)^FROM\\s+\\S+:latest\\b"
      - hook: PreToolUse
        tool: Edit
        file: "**/Dockerfile*"
        new_content:
          - kind: Regex
            pattern: "(?im)^FROM\\s+\\S+:latest\\b"

  # Larang secret literal di-hardcode lewat ENV/ARG di Dockerfile.
  - name: dockerfile-no-hardcoded-secrets
    description: Jangan hardcode secret di layer Dockerfile
    message: "Jangan hardcode secret di Dockerfile (`ENV`/`ARG`). Gunakan build secrets (`--mount=type=secret`) atau runtime env / Secret Manager, lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/Dockerfile*"
        content:
          - kind: Regex
            pattern: "(?im)^[^\\S\\n]*(ENV|ARG)[^\\S\\n]+\\w*(PASSWORD|SECRET|TOKEN|API_?KEY|PRIVATE_KEY)\\w*[^\\S\\n]*=[^\\S\\n]*\\S"
      - hook: PreToolUse
        tool: Edit
        file: "**/Dockerfile*"
        new_content:
          - kind: Regex
            pattern: "(?im)^[^\\S\\n]*(ENV|ARG)[^\\S\\n]+\\w*(PASSWORD|SECRET|TOKEN|API_?KEY|PRIVATE_KEY)\\w*[^\\S\\n]*=[^\\S\\n]*\\S"

  # Utamakan COPY daripada ADD untuk file lokal.
  - name: dockerfile-prefer-copy-over-add
    description: Pakai COPY untuk file lokal, bukan ADD
    message: "Gunakan `COPY` untuk menyalin file lokal, bukan `ADD`. (Pengecualian: `ADD` untuk URL remote atau auto-extract tar.) Perbaiki lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/Dockerfile*"
        content:
          - kind: Regex
            pattern: "(?im)^[^\\S\\n]*ADD[^\\S\\n]+"
      - hook: PreToolUse
        tool: Edit
        file: "**/Dockerfile*"
        new_content:
          - kind: Regex
            pattern: "(?im)^[^\\S\\n]*ADD[^\\S\\n]+"

  # Larang EXPOSE port yang sudah dipakai sistem Cloud Shell.
  - name: dockerfile-avoid-reserved-ports
    description: Hindari port yang dipakai sistem (900,922,970,971,980,981,8998)
    message: "Port ini dipakai sistem Cloud Shell (900/922/970/971/980/981/8998). Pilih port aplikasi yang aman (mis. 3000, 8000, 8080), lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/Dockerfile*"
        content:
          - kind: Regex
            pattern: "(?im)^[^\\S\\n]*EXPOSE[^\\S\\n]+.*\\b(900|922|970|971|980|981|8998)\\b"
      - hook: PreToolUse
        tool: Edit
        file: "**/Dockerfile*"
        new_content:
          - kind: Regex
            pattern: "(?im)^[^\\S\\n]*EXPOSE[^\\S\\n]+.*\\b(900|922|970|971|980|981|8998)\\b"

  # ───────────────────────────────────────────────
  # KEAMANAN — DETEKSI SECRET DI SOURCE
  # ───────────────────────────────────────────────

  # Larang AWS access key ter-commit di source.
  - name: no-aws-access-key
    description: Jangan commit AWS access key ke source
    message: "Terdeteksi pola AWS access key (`AKIA...`). Pindahkan ke environment variable / Secret Manager, jangan tulis di file, lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*"
        content:
          - kind: Regex
            pattern: "AKIA[0-9A-Z]{16}"
      - hook: PreToolUse
        tool: Edit
        file: "**/*"
        new_content:
          - kind: Regex
            pattern: "AKIA[0-9A-Z]{16}"

  # Larang Google API key ter-commit di source.
  - name: no-google-api-key
    description: Jangan commit Google API key ke source
    message: "Terdeteksi pola Google API key (`AIza...`). Pindahkan ke environment variable / Secret Manager, jangan tulis di file, lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*"
        content:
          - kind: Regex
            pattern: "AIza[0-9A-Za-z_\\-]{35}"
      - hook: PreToolUse
        tool: Edit
        file: "**/*"
        new_content:
          - kind: Regex
            pattern: "AIza[0-9A-Za-z_\\-]{35}"

  # Larang private key block ter-commit di source.
  - name: no-private-key-in-source
    description: Jangan commit private key ke source
    message: "Terdeteksi blok PRIVATE KEY. Jangan simpan kunci privat di repo — gunakan Secret Manager, lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*"
        content:
          - kind: Regex
            pattern: "-----BEGIN [A-Z ]*PRIVATE KEY-----"
      - hook: PreToolUse
        tool: Edit
        file: "**/*"
        new_content:
          - kind: Regex
            pattern: "-----BEGIN [A-Z ]*PRIVATE KEY-----"

  # ───────────────────────────────────────────────
  # REMINDER PROMPT-TIME (inject konteks saat relevan)
  # ───────────────────────────────────────────────

  # Saat user membahas Docker/build image — ingatkan standar multi-stage.
  - name: docker-multistage-reminder
    description: Ingatkan standar build multi-stage saat membahas Docker image
    message: |
      Standar build Docker repo ini:
      - WAJIB multi-stage: pisahkan stage BUILD (compiler/toolchain) dari stage RUNTIME (hanya artefak).
      - Base runtime minimal: `alpine` (~5MB) atau `scratch` untuk binary statis (Go/Rust); pertimbangkan distroless.
      - Target ukuran image production: 10-20MB (alpine) / <10MB (scratch); tolak image monolith >500MB.
      - Pin versi base image (jangan `:latest`); urutkan COPY dependency dulu (cache layer); sediakan `.dockerignore`.
      - Tambahkan HEALTHCHECK dan scan vuln (mis. `trivy image <nama>`) sebelum deploy.
    on:
      - hook: UserPromptSubmit
        prompt:
          - kind: Regex
            pattern: "(?i)(dockerfile|docker\\s*image|build.*image|containeriz|dockeriz|multi-?stage)"

  # Saat user membahas deploy/produksi — ingatkan kondisi & SOP VPS.
  - name: deploy-checklist-reminder
    description: Ingatkan SOP pra-deploy & batasan environment VPS
    message: |
      Checklist pra-deploy environment ini (Google Cloud Shell, EPHEMERAL):
      - Disk sudah ~76% penuh (sisa ~23G) & TIDAK ada swap — kecilkan image, hati-hati app berat (risiko OOM).
      - Set GCP project dulu: `gcloud config set project <ID>` (saat ini belum diset).
      - Commit semua kode ke Git — disk ephemeral, kerja lokal hilang saat sesi berakhir.
      - Timezone default UTC; set `Asia/Jakarta` bila app butuh WIB.
      - Jangan pakai port sistem: 22, 900, 922, 970, 971, 980, 981, 8998.
    on:
      - hook: UserPromptSubmit
        prompt:
          - kind: Regex
            pattern: "(?i)(deploy|deploy ke|production|produksi|go.?live|rilis|cloud run|gke|app engine)"

  # ═══════════════════════════════════════════════════════════════════════════
  # JEBAKAN SPESIFIK REPO INI (excalidraw-sketsa)
  # Diturunkan dari catatan insiden di .nudge/learned/. Rule = penjaga
  # deterministik saat menulis; baca file learned untuk detail lengkap.
  # ═══════════════════════════════════════════════════════════════════════════

  # In-container probe harus IPv4 — image hanya render `listen 80;` (IPv4).
  # `http://localhost/` -> ::1 ditolak. Lihat:
  # .nudge/learned/app-nginx-healthcheck-must-hit-127-0-0-1-not-localhost-image-renders-ipv4-only.md
  - name: dockerfile-probe-use-ipv4-not-localhost
    description: HEALTHCHECK/probe di dalam container app harus 127.0.0.1, bukan localhost
    message: "Probe di dalam container app (HEALTHCHECK `wget`/`curl`) harus pakai `http://127.0.0.1/`, BUKAN `http://localhost/`. Image nginx ini cuma render `listen 80;` (IPv4-only) karena script ipv6-listen jalan SEBELUM template di-generate, jadi `localhost` -> `::1` ditolak (Connection refused). Ganti ke 127.0.0.1 lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/Dockerfile*"
        content:
          - kind: Regex
            pattern: "(?im)\\b(wget|curl)\\b[^\\n]*http://localhost\\b"
      - hook: PreToolUse
        tool: Edit
        file: "**/Dockerfile*"
        new_content:
          - kind: Regex
            pattern: "(?im)\\b(wget|curl)\\b[^\\n]*http://localhost\\b"

  # `${OPENAI_API_KEY:?}` membuat SEMUA perintah compose gagal — bahkan saat
  # menjalankan profile `local` — karena interpolasi jalan atas SELURUH file
  # sebelum filter profile. Lihat:
  # .nudge/learned/compose-var-breaks-every-command-even-for-the-other-profile.md
  - name: compose-no-hard-required-profile-secret
    description: Jangan pakai ${OPENAI_API_KEY:?} di compose — pakai soft default
    message: "Jangan guard `OPENAI_API_KEY` dengan `${OPENAI_API_KEY:?...}`. Interpolasi compose jalan atas SELURUH file SEBELUM filter profile, jadi `:?` pada service profile `cloud` bikin SETIAP `docker compose` gagal — termasuk saat profile `local` aktif. Pakai soft default `${OPENAI_API_KEY:-}` dan validasi saat runtime di dalam service (ai-proxy log `key MISSING` + 500). Sisakan `:?` hanya untuk var yang selalu wajib (mis. CLOUDFLARE_TUNNEL_TOKEN). Perbaiki lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*compose*.y*ml"
        content:
          - kind: Regex
            pattern: "\\$\\{OPENAI_API_KEY:\\?"
      - hook: PreToolUse
        tool: Edit
        file: "**/*compose*.y*ml"
        new_content:
          - kind: Regex
            pattern: "\\$\\{OPENAI_API_KEY:\\?"

  # Kode browser TIDAK boleh memanggil Ollama langsung di :11434 (CORS + 403
  # Origin + tak terjangkau di Cloud Shell). Harus lewat same-origin /ollama.
  # Lihat: .nudge/learned/browser-ollama-use-the-vite-ollama-proxy-not-a-direct-call.md
  - name: browser-no-direct-ollama-port
    description: Browser code harus lewat proxy /ollama, bukan langsung :11434
    message: "Kode di `src/` jangan memanggil Ollama langsung di `:11434`. Browser kena CORS, dan Ollama balas HTTP 403 untuk Origin non-localhost (Cloud Shell origin bukan localhost); di VPS/Cloud Shell :11434 sering tak terjangkau dari browser. Panggil same-origin `/ollama/api/...` — proxy Vite (dev) / nginx (prod) yang meneruskan ke Ollama sambil strip header Origin/Referer. Ganti ke `/ollama/...` lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "src/**/*.ts*"
        content:
          - kind: Regex
            pattern: "(?i)(localhost|127\\.0\\.0\\.1):11434"
      - hook: PreToolUse
        tool: Edit
        file: "src/**/*.ts*"
        new_content:
          - kind: Regex
            pattern: "(?i)(localhost|127\\.0\\.0\\.1):11434"

  # convertToExcalidrawElements me-REGENERATE id secara default — memecah
  # addToGroup/connect/frame children yang merujuk id nanoid pre-assigned.
  # Lihat: .nudge/learned/ea-converttoexcalidrawelements-regenerates-element-ids-by-default.md
  #   dan: .nudge/learned/ea-container-labels-and-bound-arrows-connect.md
  - name: ea-convert-pass-regenerate-ids
    description: convertToExcalidrawElements wajib opsi regenerateIds eksplisit
    message: "`convertToExcalidrawElements(...)` me-REGENERATE id elemen secara DEFAULT, jadi id nanoid yang sudah di-assign EA tidak lagi cocok — memecah `addToGroup`/`connect`/`label`/frame `children` dan merge-by-id di `addElementsToView`. Selalu kirim opsi eksplisit: `{ regenerateIds: false }` untuk workbench EA (referensi id dalam-batch harus stabil), atau `{ regenerateIds: true }` KHUSUS untuk hasil Mermaid (id self-contained, hindari tabrakan). Tambahkan argumen opsi lalu coba lagi."
    on:
      - hook: PreToolUse
        tool: Write
        file: "src/**/*.ts*"
        content:
          - kind: Regex
            pattern: "convertToExcalidrawElements\\([^),]*\\)"
      - hook: PreToolUse
        tool: Edit
        file: "src/**/*.ts*"
        new_content:
          - kind: Regex
            pattern: "convertToExcalidrawElements\\([^),]*\\)"

  # ─── Reminder prompt-time untuk subsistem inti (indeks ke .nudge/learned) ───

  # Backend AI = container `codex` (Codex CLI + langganan ChatGPT) di balik shim dialek-Ollama.
  - name: ai-backend-reminder
    description: Ingatkan invariant backend AI (codex shim + kontrak /ollama) saat membahas AI
    message: |
      Invariant backend AI repo ini (detail di docs/adr/0001 + .nudge/learned/):
      - Backend = container `codex` (deploy/codex/server.js): luar = dialek Ollama (`POST /api/chat` -> `{message:{content}}`), dalam = `codex exec` (Codex CLI, auth langganan ChatGPT) + GERBANG VALIDASI (script wajib parse via AsyncFunction yang SAMA dengan scriptRunner.ts & panggil `ea.*`; retry bila gagal). ollama lokal & ai-proxy SUDAH DIHAPUS.
      - Browser SELALU panggil same-origin `/ollama/*` = nama DIALEK/kontrak, BUKAN produk Ollama. Jangan ubah kontrak — app/nginx tak boleh tahu backend-nya apa.
      - SUMBER TUNGGAL system-prompt EA = `src/ai/ollama.ts` (dikirim per-request). JANGAN taruh pengetahuan EA di AGENTS.md codex (paralel: Modelfile dulu hanya untuk bare `ollama run`).
        -> testing-excalidraw-ea-a-request-system-message-replaces-the-modelfile-system.md
      - Auth codex = `codex login --device-auth` SEKALI, persist di volume `/codex-home`. Tanpa login shim balas 503 (bukan crash). ToS: subscription sebagai backend otomatis = risiko akun.
      - Image codex (node:22-slim) WAJIB `ca-certificates`: binary Codex (Rust) pakai system cert store; tanpa itu gagal TLS ke api.openai.com ("no CA certificates found").
    on:
      - hook: UserPromptSubmit
        prompt:
          - kind: Regex
            pattern: "(?i)(codex|ollama|openai|backend ai|ai backend|generate.*script|/api/chat|device-auth)"

  # ExcalidrawAutomate / convertToExcalidrawElements / frames / mermaid.
  - name: ea-automate-reminder
    description: Ingatkan invariant EA/convert saat membahas ExcalidrawAutomate
    message: |
      Invariant ExcalidrawAutomate (src/automate/ExcalidrawAutomate.ts) — detail di .nudge/learned/:
      - `convertToExcalidrawElements` regenerate id default. Workbench EA pakai `{ regenerateIds: false }` (jaga id nanoid dalam-batch); Mermaid pakai `{ regenerateIds: true }`. Re-apply `groupIds` per id setelah convert.
        -> ea-converttoexcalidrawelements-regenerates-element-ids-by-default.md
      - Container label & bound arrow (`connect`) lewat skeleton API (label/start/end id); id from/to harus dari `add*` di run yang SAMA.
        -> ea-container-labels-and-bound-arrows-connect.md
      - Frame: emit CHILDREN sebelum elemen frame (`getElements()` urut `[...non-frame, ...frame]`); jangan kirim x/y/w/h=0 (dianggap unset -> auto-fit); children kosong -> throw.
        -> ea-frames-convert-sets-frameid-auto-sizes-but-emit-children-before-the-frame.md
      - `addMermaid`: pakai `@excalidraw/mermaid-to-excalidraw` (transitif), async + BROWSER-ONLY (tak bisa diuji di node/esbuild). Hanya flowchart jadi shape; tipe lain jadi 1 image. Tambah dep -> `npm install --package-lock-only`.
        -> ea-addmermaid-use-excalidraw-mermaid-to-excalidraw-not-the-main-pkg-browser-only.md
      - Tak ada test runner: verifikasi logika TS dengan bundle esbuild lalu node; convert yang menarik react-dom tak jalan di node (baca dist).
        -> no-test-runner-verify-ts-logic-by-bundling-with-esbuild-then-node.md
    on:
      - hook: UserPromptSubmit
        prompt:
          - kind: Regex
            pattern: "(?i)(excalidrawautomate|\\bea\\.|convertToExcalidrawElements|addFrame|addMermaid|addElementsToView|scene.?as.?code|scene code|scriptrunner|skeleton)"
