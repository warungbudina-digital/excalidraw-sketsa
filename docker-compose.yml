# Excalidraw Sketsa — production stack.
#
#   app         the built web app, served by nginx (reverse-proxies /ollama -> AI backend)
#   cloudflared Cloudflare Zero Trust tunnel — publishes the app with no inbound ports
#   collab      private SSE/HTTP room server for live canvas collaboration
#   codex       AI backend: Codex CLI (ChatGPT subscription) behind an Ollama-dialect shim
#   redis       [profile: scale] optional backplane to run >1 collab replica (see docs/SCALING.md)
#
# AI backend = `codex` (the only one). The app/browser/nginx only ever speak the /ollama/* dialect;
# the codex shim translates to the Codex CLI. Authenticate ONCE after first start:
#   docker compose exec codex codex login --device-auth
# See deploy/codex/ + docs/adr/0001-codex-cli-subscription-backend.md.
#
# Quick start:
#   cp .env.example .env      # set CLOUDFLARE_TUNNEL_TOKEN (+ optional overrides)
#   docker compose up -d --build
#   docker compose exec codex codex login --device-auth
#
# No backend binds a host port; cloudflared is outbound-only. See README "Deploy" + docs/RUNBOOK.md.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # The `model` string the browser sends in the Ollama-dialect request. The codex shim
        # ignores it (the model is whatever the subscription grants); kept for dialect parity.
        VITE_OLLAMA_MODEL: ${VITE_OLLAMA_MODEL:-codex}
    image: excalidraw-sketsa:latest
    environment:
      # Upstream nginx forwards /ollama/* to. Defaults to the codex shim; override via AI_UPSTREAM.
      OLLAMA_HOST: ${AI_UPSTREAM:-codex:8082}
      COLLAB_HOST: collab:8081
      # Upstream nginx forwards /claude/* to (the Claude AI backend shim).
      CLAUDE_HOST: ${CLAUDE_UPSTREAM:-claude:8083}
      TZ: ${TZ:-Asia/Jakarta}
    ports:
      # Host:container. For Cloud Shell use Web Preview on 8080. If you only access the app
      # through the Cloudflare tunnel, you can delete this whole `ports:` block.
      - "${APP_PORT:-8080}:80"
    depends_on:
      collab:
        condition: service_healthy
      codex:
        condition: service_healthy
    restart: unless-stopped

  collab:
    build:
      context: ./deploy/collab
      dockerfile: Dockerfile
    image: excalidraw-sketsa-collab:latest
    environment:
      PORT: 8081
      COLLAB_MAX_BODY_BYTES: 15000000
      COLLAB_MAX_CLIENTS_PER_ROOM: 25
      COLLAB_ROOM_TTL_MS: 3600000
      # Horizontal-scaling backplane. EMPTY (default) = single-instance, in-memory, unchanged.
      # Set to redis://redis:6379 + run >1 replica to scale (see docs/SCALING.md). collab keeps
      # working (single-instance) if Redis is briefly unreachable, and reconnects automatically.
      REDIS_URL: ${REDIS_URL:-}
      TZ: ${TZ:-Asia/Jakarta}
    # Private service: only nginx reaches it over the Compose network.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Optional horizontal-scaling backplane for `collab` (profile: scale). DISABLED by default —
  # without it, collab stays single-instance exactly as before. Enable by adding `scale` to
  # COMPOSE_PROFILES and setting REDIS_URL=redis://redis:6379, then `--scale collab=2`.
  # See docs/SCALING.md.
  redis:
    image: redis:7-alpine
    profiles: ["scale"]
    # Pure backplane/cache: no persistence, bounded memory (collab rooms already expire ~1h).
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    # No host port — only `collab` reaches it over the compose network.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # AI backend: Codex CLI (ChatGPT subscription) behind an Ollama-dialect shim + a server-side
  # script-validation gate. The app/nginx are unchanged (they only speak /ollama/*). The shim
  # runs `codex exec` headless; the EA system prompt comes from the app per request (src/ai/
  # ollama.ts stays the single source of truth). Auth ONCE: `codex login --device-auth`.
  codex:
    build:
      context: ./deploy/codex
      dockerfile: Dockerfile
    image: excalidraw-sketsa-codex:latest
    environment:
      PORT: 8082
      # Empty = the model the subscription grants (Codex default). Override only if needed.
      CODEX_MODEL: ${CODEX_MODEL:-}
      CODEX_MAX_ATTEMPTS: ${CODEX_MAX_ATTEMPTS:-2}
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      # Persisted Codex auth (device-login credential). A NAMED volume, NOT a host bind: Docker
      # initialises it from the image's /codex-home, which is owned by the unprivileged `node`
      # user, so codex can write the credential. (A host bind is created root-owned, which makes
      # `codex login` fail with "permission denied" for the node user.)
      - codex-auth:/codex-home
    # No `ports:` — reached only by the app over the compose network (AI_UPSTREAM=codex:8082).
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8082/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # AI backend: Claude Code CLI (`claude --print`) behind an Ollama-dialect shim — parallel
  # to the codex service. App/nginx/src/ai/ollama.ts are UNCHANGED; browser calls /claude/*.
  # Auth ONCE (credential persists to the `claude-auth` named volume at HOME=/claude-home):
  #   docker compose exec claude claude auth login
  claude:
    build:
      context: ./deploy/claude
      dockerfile: Dockerfile
    image: excalidraw-sketsa-claude:latest
    environment:
      PORT: 8083
      # Empty = Claude Code CLI default model. Override only if needed.
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      CLAUDE_MAX_ATTEMPTS: ${CLAUDE_MAX_ATTEMPTS:-2}
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      # Persisted Claude Code auth ($HOME/.claude). A NAMED volume so `claude auth login`
      # can write to it as the unprivileged `node` user (host bind would be root-owned).
      - claude-auth:/claude-home
    # No `ports:` — reached only by nginx over the compose network (/claude/* -> claude:8083).
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8083/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    # Token-based (Zero Trust dashboard-managed) tunnel. In the dashboard, point the
    # tunnel's public hostname at the service http://app:80.
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN in .env}
      TZ: ${TZ:-Asia/Jakarta}
    depends_on:
      - app
    restart: unless-stopped

volumes:
  # Codex auth credential (node-owned, see the codex service). Persists across container
  # restarts and `docker compose down`; removed by `docker compose down -v`.
  codex-auth:
  # Claude Code auth ($HOME/.claude written by `claude auth login`). Same pattern as codex-auth.
  claude-auth:
